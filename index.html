<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Space Shooter VR | Modular | Three.js + WebXR</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', 'Arial', sans-serif; }
        #game-ui {
            position: fixed;
            top: 20px;
            left: 20px;
            right: 20px;
            pointer-events: none;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            text-shadow: 0 0 5px rgba(0,0,0,0.7);
        }
        .hud-panel {
            background: rgba(0,0,0,0.65);
            backdrop-filter: blur(8px);
            padding: 10px 20px;
            border-radius: 30px;
            border-left: 4px solid #0cf;
            color: #0cf;
            font-size: 1.4rem;
            letter-spacing: 1px;
        }
        .hud-panel span {
            color: #ffaa44;
            font-weight: bold;
            font-size: 1.6rem;
        }
        #game-over-panel {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(0,0,0,0.9) 0%, #000000 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 200;
            visibility: hidden;
            backdrop-filter: blur(12px);
            font-family: monospace;
        }
        .gameover-card {
            background: #0a0a1a;
            border: 3px solid #ff3300;
            border-radius: 48px;
            padding: 40px 60px;
            text-align: center;
            box-shadow: 0 0 60px rgba(255,50,0,0.4);
            animation: pulseRed 1.5s infinite;
        }
        .gameover-card h1 {
            color: #ff4422;
            font-size: 3rem;
            margin-bottom: 20px;
        }
        .restart-btn {
            background: #ff6600;
            border: none;
            padding: 14px 32px;
            font-size: 1.5rem;
            font-weight: bold;
            border-radius: 60px;
            color: white;
            cursor: pointer;
            transition: transform 0.2s;
            margin-top: 20px;
            font-family: monospace;
        }
        .restart-btn:hover {
            transform: scale(1.05);
            background: #ffaa33;
        }
        @keyframes pulseRed {
            0% { border-color: #ff3300; box-shadow: 0 0 20px #ff3300; }
            100% { border-color: #ff8866; box-shadow: 0 0 60px #ff3300; }
        }
        #controls-note {
            position: fixed;
            bottom: 15px;
            left: 15px;
            background: rgba(0,0,0,0.5);
            color: #88aaff;
            font-size: 12px;
            padding: 5px 12px;
            border-radius: 20px;
            font-family: monospace;
            pointer-events: none;
            z-index: 100;
        }
        @media (max-width: 700px) {
            .hud-panel { font-size: 1rem; padding: 6px 12px; }
            .hud-panel span { font-size: 1.2rem; }
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="game-ui">
        <div class="hud-panel">💥 ELIMINADOS: <span id="scoreValue">0</span></div>
        <div class="hud-panel">🛡️ ESCUDOS: <span id="healthValue">3</span></div>
    </div>
    <div id="game-over-panel">
        <div class="gameover-card">
            <h1>💀 GAME OVER 💀</h1>
            <p style="color:#0cf;">Tu escudo colapsó, piloto.</p>
            <button class="restart-btn" id="restartButton">🔄 REINICIAR MISIÓN</button>
        </div>
    </div>
    <div id="controls-note">🖱️ PC: WASD + Q/E girar | 🔫 ESPACIO disparar | 🥽 VR: Joysticks inercia + Gatillo</div>

    <script type="module">
        import * as THREE from 'three';
        import { VRButton } from 'three/addons/webxr/VRButton.js';

        // --------------------------------------------------------------
        // 1. CONFIGURACIÓN RENDERIZADOR + ESCENA + CÁMARA (WebXR enabled)
        // --------------------------------------------------------------
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x010118);
        scene.fog = new THREE.FogExp2(0x010118, 0.000035);
        
        const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.2, 25000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true; // sombras suaves para inmersión
        renderer.xr.enabled = true;
        document.body.appendChild(renderer.domElement);
        document.body.appendChild(VRButton.createButton(renderer));
        
        // Grupo raíz para el jugador (nave + cámara se mueven juntos en VR/Desktop)
        const playerRoot = new THREE.Group();
        scene.add(playerRoot);
        playerRoot.add(camera);
        
        // --------------------------------------------------------------
        // 2. COMPONENTE PLAYER (nave modular con fallback procedural)
        // --------------------------------------------------------------
        class PlayerShip {
            constructor(rootGroup) {
                this.group = new THREE.Group();
                rootGroup.add(this.group);
                this.modelGroup = null;
                this.buildProceduralModel(); // siempre modelo procedural (fallback robusto)
                this.position = this.group.position;
                // propiedades físicas
                this.velocity = new THREE.Vector3(0, 0, 0);
                this.yaw = 0;
                this.floatTilt = 0;
            }
            
            buildProceduralModel() {
                // Cuerpo principal: cono alargado
                const bodyGeo = new THREE.CylinderGeometry(12, 20, 55, 32);
                const bodyMat = new THREE.MeshStandardMaterial({ color: 0x44aaff, metalness: 0.85, roughness: 0.2, emissive: 0x004466 });
                const body = new THREE.Mesh(bodyGeo, bodyMat);
                body.castShadow = true;
                body.receiveShadow = false;
                body.rotation.x = Math.PI / 2;
                this.group.add(body);
                
                // Ala central / cabina
                const cockpitGeo = new THREE.SphereGeometry(11, 24, 24);
                const cockpitMat = new THREE.MeshStandardMaterial({ color: 0x88ccff, emissive: 0x2288aa, transparent: true, opacity: 0.6 });
                const cockpit = new THREE.Mesh(cockpitGeo, cockpitMat);
                cockpit.position.set(0, 5, 17);
                this.group.add(cockpit);
                
                // Alas laterales dinámicas
                const wingMat = new THREE.MeshStandardMaterial({ color: 0x3388dd, metalness: 0.7 });
                const leftWing = new THREE.Mesh(new THREE.BoxGeometry(44, 4, 20), wingMat);
                leftWing.position.set(-32, 0, -12);
                leftWing.castShadow = true;
                const rightWing = new THREE.Mesh(new THREE.BoxGeometry(44, 4, 20), wingMat);
                rightWing.position.set(32, 0, -12);
                rightWing.castShadow = true;
                this.group.add(leftWing);
                this.group.add(rightWing);
                
                // Motores traseros (anillos)
                const engineMat = new THREE.MeshStandardMaterial({ color: 0xff7733, emissive: 0xff2200 });
                const leftEngine = new THREE.Mesh(new THREE.CylinderGeometry(7, 9, 14, 16), engineMat);
                leftEngine.position.set(-18, -2, -28);
                const rightEngine = new THREE.Mesh(new THREE.CylinderGeometry(7, 9, 14, 16), engineMat);
                rightEngine.position.set(18, -2, -28);
                this.group.add(leftEngine, rightEngine);
                
                // Punto de luz de la nave
                this.engineGlow = new THREE.PointLight(0x33aaff, 1.2, 800);
                this.engineGlow.position.set(0, -4, -32);
                this.group.add(this.engineGlow);
                
                // Posicion relativa respecto a cámara: la cámara estará por encima y detrás (vista 3ra persona superior)
                this.group.position.set(0, -14, -48);
            }
            
            updatePhysics(deltaTime, inputVector, turnInput) {
                // inercia + fricción (sensación flotante)
                const ACCEL = 22.0;
                const FRICTION = 0.92;
                const TURN_SPEED = 2.4;
                
                this.velocity.x += inputVector.x * ACCEL * deltaTime;
                this.velocity.y += inputVector.y * ACCEL * deltaTime;
                this.velocity.z += inputVector.z * 38.0 * deltaTime; // impulso adelante/atrás (atrás poco usado)
                this.velocity.multiplyScalar(FRICTION);
                
                // mover grupo raíz (jugador completo)
                playerRoot.position.x += this.velocity.x * deltaTime;
                playerRoot.position.y += this.velocity.y * deltaTime;
                playerRoot.position.z += this.velocity.z * deltaTime;
                
                // límites de arena
                playerRoot.position.x = Math.min(7200, Math.max(-7200, playerRoot.position.x));
                playerRoot.position.y = Math.min(4200, Math.max(-3200, playerRoot.position.y));
                playerRoot.position.z = Math.min(4000, Math.max(-6800, playerRoot.position.z));
                
                // giro y rotación estética (por el joystick derecho o Q/E)
                this.yaw += turnInput * TURN_SPEED * deltaTime;
                playerRoot.rotation.y = this.yaw;
                
                // efecto visual de inclinación por inercia lateral
                const targetRoll = -this.velocity.x * 0.025;
                this.group.rotation.z += (targetRoll - this.group.rotation.z) * 0.15;
                this.group.rotation.x += (this.velocity.y * 0.018 - this.group.rotation.x) * 0.12;
                
                // pequeña flotación
                this.floatTilt += deltaTime * 3.5;
                this.group.position.y = -14 + Math.sin(this.floatTilt) * 0.7;
                this.engineGlow.intensity = 0.9 + Math.random() * 0.5;
            }
            
            getWorldPosition() {
                const worldPos = new THREE.Vector3();
                this.group.getWorldPosition(worldPos);
                return worldPos;
            }
        }
        
        // --------------------------------------------------------------
        // 3. ENEMY AI (seguimiento + disparos)
        // --------------------------------------------------------------
        class Enemy {
            constructor(scene, playerRef, position) {
                this.scene = scene;
                this.playerRef = playerRef;
                this.mesh = new THREE.Group();
                // cuerpo enemigo tipo caza rojo
                const bodyGeo = new THREE.CylinderGeometry(14, 18, 40, 12);
                const mat = new THREE.MeshStandardMaterial({ color: 0xdd4422, metalness: 0.6, emissive: 0x441100 });
                const body = new THREE.Mesh(bodyGeo, mat);
                body.rotation.x = Math.PI / 2;
                this.mesh.add(body);
                const wingMat = new THREE.MeshStandardMaterial({ color: 0xaa3322 });
                const lwing = new THREE.Mesh(new THREE.BoxGeometry(28, 3, 14), wingMat);
                lwing.position.set(-24, 1, -6);
                const rwing = new THREE.Mesh(new THREE.BoxGeometry(28, 3, 14), wingMat);
                rwing.position.set(24, 1, -6);
                this.mesh.add(lwing, rwing);
                this.mesh.position.copy(position);
                scene.add(this.mesh);
                this.speed = 12 + Math.random() * 11;
                this.lastShot = 0;
                this.shootCooldown = 1.2;
            }
            
            update(deltaTime, now, enemyBulletsArray) {
                if (!this.mesh) return;
                const playerPos = this.playerRef.getWorldPosition();
                const direction = new THREE.Vector3().subVectors(playerPos, this.mesh.position).normalize();
                // seguimiento suave + avance frontal
                this.mesh.position.x += direction.x * this.speed * deltaTime * 0.85;
                this.mesh.position.y += direction.y * this.speed * deltaTime * 0.85;
                this.mesh.position.z += -15 * deltaTime; // se acerca al jugador
                this.mesh.lookAt(playerPos);
                
                if (now - this.lastShot > this.shootCooldown && this.mesh.position.distanceTo(playerPos) < 950) {
                    this.lastShot = now;
                    this.shoot(enemyBulletsArray, playerPos);
                }
            }
            
            shoot(bulletArray, targetPos) {
                const bulletGeo = new THREE.CylinderGeometry(3.2, 3.2, 45, 8);
                const bulletMat = new THREE.MeshStandardMaterial({ color: 0xff6633, emissive: 0xcc3300 });
                const projectile = new THREE.Mesh(bulletGeo, bulletMat);
                projectile.rotation.x = Math.PI / 2;
                projectile.position.copy(this.mesh.position);
                const dir = new THREE.Vector3().subVectors(targetPos, this.mesh.position).normalize();
                projectile.userData = { direction: dir, speed: 210 };
                this.scene.add(projectile);
                bulletArray.push(projectile);
                // sonido láser enemigo (silencioso pero lo activamos)
                try {
                    const audio = new Audio('data:audio/wav;base64,U3RlYWx0aCBzb3VuZCBwbGFjZWhvbGRlcg=='); // dummy
                    audio.volume = 0.1;
                    audio.play().catch(()=>{});
                } catch(e) {}
            }
            
            dispose() {
                this.scene.remove(this.mesh);
            }
        }
        
        // --------------------------------------------------------------
        // 4. OBSTACLE (asteroides con geometría optimizada)
        // --------------------------------------------------------------
        class Obstacle {
            constructor(scene, position) {
                const geos = [new THREE.DodecahedronGeometry(24), new THREE.IcosahedronGeometry(26), new THREE.OctahedronGeometry(28)];
                const geo = geos[Math.floor(Math.random() * geos.length)];
                const mat = new THREE.MeshStandardMaterial({ color: 0xaa8866, roughness: 0.8, metalness: 0.1 });
                this.mesh = new THREE.Mesh(geo, mat);
                const scale = 0.7 + Math.random() * 1.2;
                this.mesh.scale.set(scale, scale, scale);
                this.mesh.position.copy(position);
                scene.add(this.mesh);
                this.rotSpeed = new THREE.Vector3(Math.random() * 0.02, Math.random() * 0.02, Math.random() * 0.02);
            }
            update(deltaTime) {
                this.mesh.position.z -= 22 * deltaTime;
                this.mesh.rotateX(this.rotSpeed.x);
                this.mesh.rotateY(this.rotSpeed.y);
            }
            dispose() { if(this.mesh.parent) this.mesh.parent.remove(this.mesh); }
        }
        
        // --------------------------------------------------------------
        // 5. GAMEMANAGER: estado, spawn, colisiones, HUD, reinicio
        // --------------------------------------------------------------
        class GameManager {
            constructor(scene, playerShip) {
                this.scene = scene;
                this.player = playerShip;
                this.enemies = [];
                this.obstacles = [];
                this.playerBullets = [];
                this.enemyBullets = [];
                this.score = 0;
                this.health = 3;
                this.gameActive = true;
                this.spawnCounter = 0;
                this.enemySpawnCounter = 0;
                this.difficultyFactor = 1;
                
                this.updateUI();
                this.initStars();
                this.initAmbience();
            }
            
            initStars() {
                const starsCount = 5000;
                const starGeo = new THREE.BufferGeometry();
                const starPositions = new Float32Array(starsCount * 3);
                for (let i = 0; i < starsCount; i++) {
                    starPositions[i*3] = (Math.random() - 0.5) * 24000;
                    starPositions[i*3+1] = (Math.random() - 0.5) * 14000;
                    starPositions[i*3+2] = (Math.random() - 0.5) * 18000 - 5000;
                }
                starGeo.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
                const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 1.2, transparent: true });
                this.starField = new THREE.Points(starGeo, starMat);
                this.scene.add(this.starField);
            }
            
            initAmbience() {
                const ambient = new THREE.AmbientLight(0x333366, 0.55);
                const dirLight = new THREE.DirectionalLight(0xffeedd, 1.4);
                dirLight.position.set(500, 1000, 400);
                this.scene.add(ambient, dirLight);
                const backLight = new THREE.PointLight(0x2266ff, 0.9, 3000);
                backLight.position.set(0, 200, -300);
                this.scene.add(backLight);
            }
            
            updateUI() {
                document.getElementById('scoreValue').innerText = this.score;
                document.getElementById('healthValue').innerText = this.health;
            }
            
            spawnObstacle() {
                const pos = new THREE.Vector3(
                    playerRoot.position.x + (Math.random() - 0.5) * 6000,
                    playerRoot.position.y + (Math.random() - 0.5) * 4000,
                    playerRoot.position.z - 5500 - Math.random() * 4000
                );
                const obs = new Obstacle(this.scene, pos);
                this.obstacles.push(obs);
            }
            
            spawnEnemy() {
                const pos = new THREE.Vector3(
                    playerRoot.position.x + (Math.random() - 0.5) * 4500,
                    playerRoot.position.y + (Math.random() - 0.5) * 3200,
                    playerRoot.position.z - 4800 - Math.random() * 3800
                );
                const enemy = new Enemy(this.scene, this.player, pos);
                this.enemies.push(enemy);
            }
            
            firePlayerBullet() {
                if (!this.gameActive) return;
                const bulletGeo = new THREE.CylinderGeometry(3.8, 3.8, 65, 12);
                const bulletMat = new THREE.MeshStandardMaterial({ color: 0x44ffff, emissive: 0x00aaff });
                const bullet = new THREE.Mesh(bulletGeo, bulletMat);
                bullet.rotation.x = Math.PI / 2;
                const worldPos = this.player.getWorldPosition();
                bullet.position.copy(worldPos);
                // dirección con inercia adicional para efecto "balístico"
                const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(playerRoot.quaternion);
                const inertiaInfluence = new THREE.Vector3(this.player.velocity.x * 0.003, this.player.velocity.y * 0.003, 0);
                let dir = forward.clone().add(inertiaInfluence);
                dir.normalize();
                bullet.userData = { direction: dir, speed: 380 };
                this.scene.add(bullet);
                this.playerBullets.push(bullet);
                // efecto sonoro ligero
                try { new Audio('data:audio/wav;base64,U3RlYWx0aHNob3Q=').play().catch(()=>{}); } catch(e) {}
            }
            
            createExplosion(position) {
                // partículas de explosión optimizadas con BufferGeometry
                const partCount = 60;
                const geom = new THREE.BufferGeometry();
                const positions = new Float32Array(partCount * 3);
                const velocities = [];
                for (let i = 0; i < partCount; i++) {
                    positions[i*3] = position.x;
                    positions[i*3+1] = position.y;
                    positions[i*3+2] = position.z;
                    velocities.push(new THREE.Vector3(
                        (Math.random() - 0.5) * 140,
                        (Math.random() - 0.5) * 140,
                        (Math.random() - 0.5) * 140
                    ));
                }
                geom.setAttribute('position', new THREE.BufferAttribute(positions, 3));
                const partMat = new THREE.PointsMaterial({ color: 0xff8844, size: 13, transparent: true });
                const particleSys = new THREE.Points(geom, partMat);
                this.scene.add(particleSys);
                let startTime = performance.now();
                const animateExpl = () => {
                    const elapsed = (performance.now() - startTime) / 1000;
                    if (elapsed > 0.75) { this.scene.remove(particleSys); return; }
                    const attr = particleSys.geometry.attributes.position.array;
                    for (let i = 0; i < partCount; i++) {
                        attr[i*3] += velocities[i].x * 0.022;
                        attr[i*3+1] += velocities[i].y * 0.022;
                        attr[i*3+2] += velocities[i].z * 0.022;
                    }
                    particleSys.geometry.attributes.position.needsUpdate = true;
                    requestAnimationFrame(animateExpl);
                };
                animateExpl();
            }
            
            damagePlayer() {
                if (!this.gameActive) return;
                this.health--;
                this.updateUI();
                this.createExplosion(this.player.getWorldPosition());
                // vibración háptica en VR si está disponible
                if (renderer.xr.isPresenting) {
                    const session = renderer.xr.getSession();
                    if (session && session.inputSources) {
                        for (let source of session.inputSources) {
                            if (source.gamepad && source.gamepad.hapticActuators) {
                                source.gamepad.hapticActuators[0]?.playEffect('dual-rumble', { duration: 400, strongMagnitude: 1.0, weakMagnitude: 0.6 });
                            }
                        }
                    }
                }
                if (this.health <= 0) {
                    this.gameActive = false;
                    document.getElementById('game-over-panel').style.visibility = 'visible';
                }
            }
            
            update(deltaTime, now) {
                if (!this.gameActive) return;
                
                // Spawn dinámico (dificultad creciente con score)
                this.difficultyFactor = 1 + Math.floor(this.score / 12);
                this.spawnCounter += deltaTime;
                this.enemySpawnCounter += deltaTime;
                if (this.spawnCounter > Math.max(0.5, 1.4 - this.difficultyFactor * 0.07)) {
                    this.spawnCounter = 0;
                    let obsCount = Math.min(4, 1 + Math.floor(this.difficultyFactor / 2));
                    for (let i = 0; i < obsCount; i++) this.spawnObstacle();
                }
                if (this.enemySpawnCounter > Math.max(1.2, 2.1 - this.difficultyFactor * 0.1)) {
                    this.enemySpawnCounter = 0;
                    this.spawnEnemy();
                    if (this.difficultyFactor > 3 && Math.random() < 0.4) this.spawnEnemy();
                }
                
                // Actualizar obstáculos y colisión
                for (let i=0; i<this.obstacles.length; i++) {
                    const obs = this.obstacles[i];
                    obs.update(deltaTime);
                    if (obs.mesh.position.distanceTo(this.player.getWorldPosition()) < 105) {
                        this.damagePlayer();
                        obs.dispose();
                        this.obstacles.splice(i,1); i--;
                    } else if (obs.mesh.position.z > this.player.getWorldPosition().z + 1500) {
                        obs.dispose();
                        this.obstacles.splice(i,1); i--;
                    }
                }
                
                // Actualizar enemigos + colisión balas propias
                for (let i=0; i<this.enemies.length; i++) {
                    const e = this.enemies[i];
                    e.update(deltaTime, now, this.enemyBullets);
                    const distToPlayer = e.mesh.position.distanceTo(this.player.getWorldPosition());
                    if (distToPlayer < 108) {
                        this.damagePlayer();
                        e.dispose();
                        this.enemies.splice(i,1); i--;
                        continue;
                    }
                    // colisión con balas del jugador
                    for (let j=0; j<this.playerBullets.length; j++) {
                        const bullet = this.playerBullets[j];
                        if (bullet.position.distanceTo(e.mesh.position) < 85) {
                            this.createExplosion(e.mesh.position);
                            this.scene.remove(bullet);
                            this.playerBullets.splice(j,1);
                            e.dispose();
                            this.enemies.splice(i,1);
                            this.score++;
                            this.updateUI();
                            i--; break;
                        }
                    }
                }
                
                // mover balas propias
                for (let i=0; i<this.playerBullets.length; i++) {
                    const b = this.playerBullets[i];
                    b.position.x += b.userData.direction.x * b.userData.speed * deltaTime;
                    b.position.y += b.userData.direction.y * b.userData.speed * deltaTime;
                    b.position.z += b.userData.direction.z * b.userData.speed * deltaTime;
                    if (Math.abs(b.position.z - this.player.getWorldPosition().z) > 6000) {
                        this.scene.remove(b); this.playerBullets.splice(i,1); i--;
                    }
                }
                
                // balas enemigas
                for (let i=0; i<this.enemyBullets.length; i++) {
                    const eb = this.enemyBullets[i];
                    eb.position.x += eb.userData.direction.x * eb.userData.speed * deltaTime;
                    eb.position.y += eb.userData.direction.y * eb.userData.speed * deltaTime;
                    eb.position.z += eb.userData.direction.z * eb.userData.speed * deltaTime;
                    if (eb.position.distanceTo(this.player.getWorldPosition()) < 70) {
                        this.damagePlayer();
                        this.scene.remove(eb);
                        this.enemyBullets.splice(i,1); i--;
                    } else if (Math.abs(eb.position.z - this.player.getWorldPosition().z) > 5000) {
                        this.scene.remove(eb);
                        this.enemyBullets.splice(i,1); i--;
                    }
                }
                
                // rotación estrellas
                if (this.starField) this.starField.rotation.y += 0.0003;
            }
            
            reset() {
                // limpiar todos los objetos dinámicos
                this.enemies.forEach(e => e.dispose());
                this.obstacles.forEach(o => o.dispose());
                this.playerBullets.forEach(b => this.scene.remove(b));
                this.enemyBullets.forEach(b => this.scene.remove(b));
                this.enemies = [];
                this.obstacles = [];
                this.playerBullets = [];
                this.enemyBullets = [];
                this.score = 0;
                this.health = 3;
                this.gameActive = true;
                this.difficultyFactor = 1;
                this.updateUI();
                playerRoot.position.set(0, 0, 0);
                playerRoot.rotation.set(0,0,0);
                this.player.velocity.set(0,0,0);
                document.getElementById('game-over-panel').style.visibility = 'hidden';
            }
        }
        
        // --------------------------------------------------------------
        // 6. INPUT HÍBRIDO (VR Joysticks + PC)
        // --------------------------------------------------------------
        const leftStick = { x:0, y:0 };
        const rightStick = { x:0, y:0 };
        let leftGamepadRef = null, rightGamepadRef = null;
        
        function updateVRInputs() {
            const session = renderer.xr.getSession();
            if (!session || !session.inputSources) return;
            for (const source of session.inputSources) {
                if (!source.gamepad) continue;
                if (source.handedness === 'left' && source.gamepad.axes.length >= 2) {
                    leftStick.x = source.gamepad.axes[0];
                    leftStick.y = source.gamepad.axes[1];
                }
                if (source.handedness === 'right' && source.gamepad.axes.length >= 4) {
                    rightStick.x = source.gamepad.axes[2];
                    rightStick.y = source.gamepad.axes[3];
                }
            }
        }
        
        // Keyboard state
        const keyState = { w:false, s:false, a:false, d:false, q:false, e:false, space:false };
        window.addEventListener('keydown', (e) => {
            const k = e.code;
            if (k === 'KeyW') keyState.w = true;
            if (k === 'KeyS') keyState.s = true;
            if (k === 'KeyA') keyState.a = true;
            if (k === 'KeyD') keyState.d = true;
            if (k === 'KeyQ') keyState.q = true;
            if (k === 'KeyE') keyState.e = true;
            if (k === 'Space') { keyState.space = true; e.preventDefault(); }
            if (k === 'KeyR' && gameManager && !gameManager.gameActive) gameManager.reset();
        });
        window.addEventListener('keyup', (e) => {
            const k = e.code;
            if (k === 'KeyW') keyState.w = false;
            if (k === 'KeyS') keyState.s = false;
            if (k === 'KeyA') keyState.a = false;
            if (k === 'KeyD') keyState.d = false;
            if (k === 'KeyQ') keyState.q = false;
            if (k === 'KeyE') keyState.e = false;
            if (k === 'Space') keyState.space = false;
        });
        
        // --------------------------------------------------------------
        // 7. INSTANCIAR E INICIAR BUCLE
        // --------------------------------------------------------------
        const playerShip = new PlayerShip(playerRoot);
        const gameManager = new GameManager(scene, playerShip);
        
        // Posicionar cámara en vista superior cenital pero con dinámica inmersiva
        camera.position.set(0, 28, 72);
        camera.lookAt(0, 0, 0);
        
        // triggers de disparo para VR y teclado
        const controllers = [renderer.xr.getController(0), renderer.xr.getController(1)];
        controllers.forEach(ctrl => {
            ctrl.addEventListener('selectstart', () => gameManager.firePlayerBullet());
        });
        
        let lastTimestamp = 0;
        function animate(time) {
            const delta = Math.min(0.033, (time - lastTimestamp) / 1000);
            lastTimestamp = time;
            
            if (renderer.xr.isPresenting) updateVRInputs();
            
            // Construir vector de movimiento (PC o VR)
            let moveX = 0, moveY = 0, moveZ = 0, turn = 0;
            if (renderer.xr.isPresenting) {
                if (Math.abs(leftStick.x) > 0.12) moveX = leftStick.x;
                if (Math.abs(leftStick.y) > 0.12) moveY = -leftStick.y;
                if (Math.abs(rightStick.x) > 0.12) turn = rightStick.x * 1.8;
                if (rightStick.y < -0.15) moveZ = 1.0;
                if (rightStick.y > 0.15) moveZ = -0.6;
            } else {
                if (keyState.a) moveX = -1.0;
                if (keyState.d) moveX = 1.0;
                if (keyState.w) moveY = 1.0;
                if (keyState.s) moveY = -1.0;
                if (keyState.q) turn = -1.6;
                if (keyState.e) turn = 1.6;
                if (keyState.space) { gameManager.firePlayerBullet(); keyState.space = false; }
                moveZ = 0.6; // avance constante en escritorio
            }
            
            playerShip.updatePhysics(delta, new THREE.Vector3(moveX, moveY, moveZ), turn);
            gameManager.update(delta, time);
            
            renderer.render(scene, camera);
        }
        
        renderer.setAnimationLoop(animate);
        
        // reinicio por botón UI
        document.getElementById('restartButton').addEventListener('click', () => {
            gameManager.reset();
        });
        
        // ajuste de ventana
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
    </script>
</body>
</html>
