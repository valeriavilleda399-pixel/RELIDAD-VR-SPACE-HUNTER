<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="imagen/icono.png">
    
    <title>Space Hunter</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200&display=swap" rel="stylesheet">
   
</head>


<body>

    <div id="start-screen">
        <h2 style="margin-bottom: 40px;">Sistemas Listos</h2>
        <button class="start-btn" onclick="iniciarCarga()">Iniciar Misión</button>
    </div>

    <audio id="espacio-musica" loop>
        <source src="musica/musica_espacial.mp3" type="audio/mpeg">
    </audio>

    <div class="space-background"></div>
    <div class="space-overlay"></div>

    <div class="loader-container" id="loader">
        <h2 id="status">Iniciando Sistemas...</h2>
        <div class="progress-bar-bg">
            <div id="fill" class="progress-fill"></div>
        </div>
        <div id="count" class="percentage">0%</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
